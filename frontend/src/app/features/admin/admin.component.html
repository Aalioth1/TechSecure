<mat-sidenav-container class="admin-shell">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <div class="brand" aria-label="TechSecure">
      <img
        class="brand__logo"
        src="assets/images/logo-techsecure.png"
        width="160"
        alt="TechSecure"
      />
    </div>
    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let item of menuItems"
        [class.is-active]="selectedSection === item.key"
        (click)="selectSection(item.key)"
      >
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="admin-toolbar">
      <span>Vista administrador</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="logout()" aria-label="Cerrar sesión">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="admin-content">
      <section class="section-panel">
        <div class="section-panel__header">
          <h2>{{ sectionContent[selectedSection].title }}</h2>
          <p>{{ sectionContent[selectedSection].description }}</p>
        </div>

        <div class="section-panel__body">
          <mat-card class="info-card">
            <h4>Acciones rapidas</h4>
            <div class="actions">
              <button
                mat-stroked-button
                color="primary"
                *ngFor="let action of sectionContent[selectedSection].actions"
              >
                {{ action }}
              </button>
            </div>
          </mat-card>

          <mat-card class="info-card">
            <h4>Pendientes</h4>
            <ul>
              <li *ngFor="let task of sectionContent[selectedSection].tasks">{{ task }}</li>
            </ul>
          </mat-card>
        </div>
      </section>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
