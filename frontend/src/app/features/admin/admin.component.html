<mat-sidenav-container class="admin-shell">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <div class="brand" aria-label="TechSecure">
      <img
        class="brand__logo"
        src="assets/images/logo-techsecure.png"
        width="160"
        alt="TechSecure"
      />
    </div>
    <mat-nav-list>
      <a mat-list-item>
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item>
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span matListItemTitle>Agenda mensual</span>
      </a>
      <a mat-list-item>
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>Registro de usuarios</span>
      </a>
      <a mat-list-item>
        <mat-icon matListItemIcon>mail</mat-icon>
        <span matListItemTitle>Mensajes</span>
      </a>
      <a mat-list-item>
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Gestión de usuarios</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="admin-toolbar">
      <span>Vista administrador</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="logout()" aria-label="Cerrar sesión">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="admin-content">
      <h2>Gestión de usuarios</h2>
      <p>Listado y formulario de edición pendientes de implementar (siguiente sprint).</p>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
